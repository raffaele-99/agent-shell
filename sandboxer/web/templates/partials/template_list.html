{% if templates %}
<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-4">
  {% for t in templates %}
  {% include "partials/template_card.html" %}
  {% endfor %}
</div>
{% else %}
<div class="bg-slate-800 rounded-xl border border-slate-700 p-8 text-center">
  <p class="text-slate-400 mb-4">No templates yet.</p>
  <a href="/templates/new"
     class="inline-flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-medium rounded-lg transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    Create your first template
  </a>
</div>
{% endif %}
