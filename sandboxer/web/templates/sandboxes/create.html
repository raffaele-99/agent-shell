{% extends "base.html" %}
{% block title %}New Sandbox — Sandboxer{% endblock %}

{% block content %}
<div class="max-w-2xl">
  <div class="mb-6">
    <a href="/sandboxes/" class="text-sm text-slate-400 hover:text-cyan-400 transition-colors">&larr; Back to Sandboxes</a>
    <h1 class="text-2xl font-bold text-white mt-2">Create Sandbox</h1>
  </div>

  <form hx-post="/sandboxes/" hx-swap="none"
        class="bg-slate-800 rounded-xl border border-slate-700 p-6 space-y-5">

    {% if error %}
    <div class="bg-red-600/20 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
      {{ error }}
    </div>
    {% endif %}

    <div>
      <label for="template" class="block text-sm font-medium text-slate-300 mb-1.5">Template <span class="text-red-400">*</span></label>
      <select id="template" name="template" required
              class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        <option value="">Select a template...</option>
        {% for t in templates %}
        <option value="{{ t.name }}">{{ t.name }}{% if t.description %} — {{ t.description }}{% endif %}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="agent" class="block text-sm font-medium text-slate-300 mb-1.5">Agent <span class="text-red-400">*</span></label>
      <select id="agent" name="agent" required
              class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
        <option value="">Select an agent...</option>
        {% for a in agents %}
        <option value="{{ a.name }}">{{ a.name }} ({{ a.agent_type }})</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label for="workspace" class="block text-sm font-medium text-slate-300 mb-1.5">Workspace Path</label>
      <input type="text" id="workspace" name="workspace" value="." placeholder="."
             class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
      <p class="text-xs text-slate-500 mt-1">Host directory to mount as workspace</p>
    </div>

    <div>
      <label for="name" class="block text-sm font-medium text-slate-300 mb-1.5">Name <span class="text-slate-500">(optional)</span></label>
      <input type="text" id="name" name="name" placeholder="Auto-generated if empty"
             class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label for="ttl" class="block text-sm font-medium text-slate-300 mb-1.5">TTL <span class="text-slate-500">(seconds)</span></label>
        <input type="number" id="ttl" name="ttl" min="0" placeholder="No limit"
               class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
      </div>
      <div>
        <label for="idle_timeout" class="block text-sm font-medium text-slate-300 mb-1.5">Idle Timeout <span class="text-slate-500">(seconds)</span></label>
        <input type="number" id="idle_timeout" name="idle_timeout" min="0" placeholder="No limit"
               class="w-full bg-slate-700 border border-slate-600 text-white text-sm rounded-lg px-3 py-2.5 focus:ring-2 focus:ring-cyan-500 focus:border-transparent">
      </div>
    </div>

    <div class="pt-2">
      <button type="submit"
              class="w-full sm:w-auto px-6 py-2.5 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-medium rounded-lg transition-colors min-h-[44px]">
        Create Sandbox
      </button>
    </div>
  </form>
</div>
{% endblock %}
