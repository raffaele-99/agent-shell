{% extends "base.html" %}
{% block title %}Sandboxes — Sandboxer{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-6">
  <h1 class="text-2xl font-bold text-white">Sandboxes</h1>
  <a href="/sandboxes/new"
     class="inline-flex items-center gap-2 px-4 py-2 bg-cyan-600 hover:bg-cyan-500 text-white text-sm font-medium rounded-lg transition-colors">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
    New Sandbox
  </a>
</div>

<div id="sandbox-list"
     hx-get="/api/sandboxes" hx-trigger="every 10s" hx-swap="innerHTML">
  {% include "partials/sandbox_list.html" %}
</div>
{% endblock %}
